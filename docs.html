<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Docs — depend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Poppins:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .docs{display:grid;grid-template-columns:248px 1fr;gap:40px;align-items:start;padding-top:30px}
  .side{position:sticky;top:84px;max-height:calc(100vh - 100px);overflow-y:auto;padding-right:6px}
  .side::-webkit-scrollbar{width:6px}.side::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  .side-search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:0 13px;margin-bottom:16px}
  .side-search input{flex:1;background:none;border:none;outline:none;color:var(--txt);
    font-size:13.5px;padding:11px 0;font-family:var(--font-body)}
  .side-search svg{color:var(--txt-faint);flex:0 0 16px}
  .side a{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:9px;
    color:var(--txt-dim);font-size:14px;transition:.13s;cursor:pointer}
  .side a:hover{background:var(--surface);color:var(--txt)}
  .side a.on{background:var(--surface-2);color:var(--peri);font-weight:500}
  .side a .badge{font-family:var(--font-mono);font-size:11px;color:var(--txt-faint)}
  .content{min-width:0}
  .content h1{font-family:var(--font-display);font-size:40px;font-weight:600;letter-spacing:-.03em;margin-bottom:6px}
  .content .lead{color:var(--txt-dim);font-size:16px;margin-bottom:30px;max-width:640px}
  .doc-cmd{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);
    margin-bottom:12px;overflow:hidden;transition:.14s}
  .doc-cmd:hover{border-color:var(--peri-deep)}
  .dc-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none}
  .dc-syntax{font-family:var(--font-mono);font-size:14.5px;color:var(--peri-bright);font-weight:500}
  .dc-syntax .a{color:var(--txt-faint);font-weight:400}
  .dc-desc-inline{color:var(--txt-dim);font-size:13.5px;margin-left:auto;text-align:right;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46%}
  .dc-copy{flex:0 0 auto;background:none;border:1px solid var(--line);color:var(--txt-faint);
    width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:13px;transition:.14s}
  .dc-copy:hover{border-color:var(--peri-deep);color:var(--peri)}
  .doc-sub{font-family:var(--font-mono);font-size:13px;color:var(--peri);margin:26px 0 12px;
    letter-spacing:.04em;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .doc-note{background:var(--surface);border:1px solid var(--line);border-left:2px solid var(--peri-deep);
    border-radius:10px;padding:13px 16px;color:var(--txt-dim);font-size:14px;margin-bottom:12px;line-height:1.5}
  .callout{display:flex;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r);padding:16px 18px;margin-bottom:26px}
  .callout .ic{color:var(--peri);flex:0 0 20px}
  .callout b{color:var(--txt)}
  .callout p{color:var(--txt-dim);font-size:14px;margin-top:3px}
  .mobile-nav{display:none}
  @media(max-width:880px){.docs{grid-template-columns:1fr;gap:18px}
    .side{position:static;max-height:none}
    .mobile-nav{display:block}.side.desktop{display:none}}
</style></head><body>
<script src="/shared.js"></script>
<main class="wrap docs">
  <aside class="side desktop">
    <div class="side-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="dsearch" placeholder="Search docs…" autocomplete="off">
    </div>
    <nav id="sidenav"></nav>
  </aside>
  <article class="content" id="content"><div style="color:var(--txt-faint);padding:60px 0">Loading docs…</div></article>
</main>

<script>
mountChrome('docs');
let DOCS=[],current=null;

// describe a category in human terms (setup intros)
const INTROS={
  'moderation':'Core moderation: removing, restricting and reversing actions against members. Most require the <b>Moderate Members</b> permission.',
  'anti-nuke':'Reversible protection against mass-join raids and nuke attempts. AntiRaid strips, jails or bans offenders past a configured threshold and undoes the damage where possible. Owner & antinuke admins only — start with <code>,an config</code>.',
  'fake-permissions':'Grant Discord permissions to a role <i>only inside depend</i>, without touching its real server permissions. Useful for letting trusted members moderate without real admin.',
  'voicemaster':'Join-to-create voice channels. Run <code>,vmsetup</code> and pick Simple or Full; members get their own channel they fully control from a panel.',
  'welcome':'Greet new members and farewell leavers. Set a channel, then customise the message with placeholders like <code>{user.mention}</code> and <code>{count}</code>.',
  'tickets':'A support-ticket system with a button panel, transcripts and per-ticket member management. Start with <code>,ticket setup &lt;category&gt;</code>.',
  'role':'Create, assign, colour and manage roles — including temporary roles, sticky roles and bulk grants to humans or bots.',
  'embeds-messages':'Build named embeds with <code>,embedbuilder</code>, then reuse them across welcome, boost, badge and vanity-gate systems. All text fields support placeholders.',
  'filter-automod':'Word filters, spam/caps/link controls and native Discord AutoMod integration. Disable or scope individual commands per channel or role.',
  'leveling':'',
  'economy-leveling':'XP, levels and a server economy. Members rank up by chatting; configure rewards and leaderboards.',
};

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');}
function argHTML(a){return esc(a).replace(/(\[[^\]]+\]|&lt;[^>]+&gt;|@\w+|#\w+)/g,'<span class="a">$1</span>');}

function parse(line){
  if(line==='')return{kind:'spacer'};
  const sec=line.match(/^—\s*(.+?)\s*—$/);if(sec)return{kind:'sub',text:sec[1]};
  if(line.startsWith('-#'))return{kind:'note',text:line.replace(/^-#\s*/,'')};
  const first=line.split(' ')[0];
  const looksCmd=/^[a-z][a-z0-9_]*(\/[a-z0-9_]+)?$/i.test(first)&&/^[a-z]/.test(line);
  if(!looksCmd)return{kind:'note',text:line};
  let alias=null;const am=line.match(/\((alias(?:es)?:\s*[^)]+)\)/i);if(am)alias=am[1];
  let work=line.replace(/\s*\((alias(?:es)?:[^)]+)\)/i,'').trim();
  let desc='';const dm=work.split(/\s+[—–]\s+/);
  if(dm.length>1){work=dm[0].trim();desc=dm.slice(1).join(' — ').trim();}
  const p=work.split(/\s+/);
  return{kind:'cmd',name:p[0],args:p.slice(1).join(' '),desc,alias};
}

function renderSidebar(filter){
  const nav=document.getElementById('sidenav');
  nav.innerHTML=DOCS.filter(d=>!filter||d.title.toLowerCase().includes(filter)||
    d.cmds.some(c=>c.toLowerCase().includes(filter))).map(d=>{
    const n=d.cmds.filter(l=>/^[a-z]/.test(l)&&!l.startsWith('-#')&&!l.startsWith('—')).length;
    return `<a data-id="${d.id}" class="${current===d.id?'on':''}">${esc(d.title)}<span class="badge">${n}</span></a>`;
  }).join('');
  nav.querySelectorAll('a').forEach(a=>a.onclick=()=>show(a.dataset.id));
}

function show(id){
  current=id;const d=DOCS.find(x=>x.id===id);if(!d)return;
  renderSidebar(document.getElementById('dsearch').value.trim().toLowerCase());
  const intro=INTROS[id]||`Reference for every <b>${esc(d.title)}</b> command.`;
  let body='';
  d.cmds.map(parse).forEach(r=>{
    if(r.kind==='spacer')return;
    if(r.kind==='sub'){body+=`<div class="doc-sub">${esc(r.text)}</div>`;return;}
    if(r.kind==='note'){body+=`<div class="doc-note">${esc(r.text)}</div>`;return;}
    const full=',' + r.name + (r.args?' '+r.args:'');
    body+=`<div class="doc-cmd"><div class="dc-head">
      <span class="dc-syntax">,${esc(r.name)}${r.args?` <span class="a">${argHTML(r.args)}</span>`:''}</span>
      ${r.desc?`<span class="dc-desc-inline">${esc(r.desc)}</span>`:''}
      <button class="dc-copy" data-cp="${esc(full).replace(/"/g,'&quot;')}">⧉</button></div></div>`;
  });
  document.getElementById('content').innerHTML=`
    <h1>${esc(d.title)}</h1>
    <div class="callout"><span class="ic">ℹ</span><div><b>${esc(d.title)}</b><p>${intro}</p></div></div>
    ${body}`;
  document.querySelectorAll('.dc-copy').forEach(b=>b.onclick=e=>{
    e.stopPropagation();navigator.clipboard?.writeText(b.dataset.cp);
    const o=b.textContent;b.textContent='✓';b.style.color='var(--green)';
    setTimeout(()=>{b.textContent=o;b.style.color='';},1100);
  });
  history.replaceState(null,'','#'+id);
  document.getElementById('content').scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('dsearch').addEventListener('input',e=>renderSidebar(e.target.value.trim().toLowerCase()));

(async()=>{
  DOCS=await (await fetch('/api/commands')).json().then(c=>c.map(x=>({
    id:slug(x.title.replace(/ Commands$/,'')),title:x.title.replace(/ Commands$/,''),cmds:x.cmds})));
  renderSidebar('');
  const hash=location.hash.slice(1);
  show(DOCS.find(d=>d.id===hash)?hash:DOCS[0].id);
})();
</script>
</body></html>
