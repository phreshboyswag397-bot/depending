<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>depend</title>
<link rel="icon" type="image/png" href="/favicon.png?v=2">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
<meta name="description" content="A Discord bot for moderation, automation, and social tools.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Poppins:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  /* ── hero split: headline left, command palette right ── */
  .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;
    padding:70px 0 40px;min-height:62vh}
  .hero-eyebrow{font-family:var(--font-mono);font-size:12.5px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--txt-faint);display:flex;align-items:center;gap:10px;margin-bottom:26px}
  .hero-eyebrow::before{content:'';width:26px;height:1px;background:var(--peri-deep)}
  .hero h1{font-family:var(--font-mono);font-weight:700;font-size:clamp(40px,5.6vw,68px);
    line-height:1.04;letter-spacing:-.02em;color:#f6f5fb;min-height:2.1em}
  .hero h1 .l2{display:block}
  .hero h1 .soft{color:#6f6f7d}
  .hero h1 .dot{color:var(--peri)}
  .hero .sub{font-family:var(--font-mono);color:var(--txt-faint);font-size:14.5px;line-height:1.7;
    max-width:430px;margin:24px 0 30px}
  .hero-cta{display:flex;gap:12px;flex-wrap:wrap}
  .hero-cta .btn{font-family:var(--font-mono);font-size:14px}

  /* command palette */
  .palette{background:linear-gradient(180deg,rgba(18,18,24,.5),rgba(8,8,11,.3));
    border:1px solid var(--line);border-radius:18px;padding:10px;backdrop-filter:blur(6px);
    box-shadow:0 30px 80px -40px rgba(0,0,0,.9);opacity:0;transform:translateY(14px);
    animation:rise .7s .2s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .pal-item{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:12px;
    cursor:pointer;transition:.15s;border:1px solid transparent;position:relative}
  .pal-item .pi{width:34px;height:34px;border-radius:9px;flex:0 0 34px;display:grid;place-items:center;
    background:var(--surface-3);border:1px solid var(--line);color:var(--txt-dim);transition:.15s}
  .pal-item .pt{font-family:var(--font-mono);font-size:15px;font-weight:600;color:var(--txt-dim);transition:.15s}
  .pal-item .pa{margin-left:auto;color:var(--txt-faint);opacity:0;transform:translateX(-6px);transition:.15s}
  .pal-item.sel,.pal-item:hover{background:var(--surface);border-color:var(--line-2)}
  .pal-item.sel .pi,.pal-item:hover .pi{background:var(--peri);color:#000;border-color:var(--peri)}
  .pal-item.sel .pt,.pal-item:hover .pt{color:#fff}
  .pal-item.sel .pa,.pal-item:hover .pa{opacity:1;transform:none;color:var(--peri)}
  .pal-hint{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--txt-faint);
    text-transform:uppercase;padding:14px 16px 6px;border-top:1px solid var(--line);margin-top:6px}

  /* marquee (kept) */
  .marquee{margin:10px auto 70px;max-width:1000px;overflow:hidden;padding:6px 0;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);
    mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent)}
  .marquee-track{display:flex;gap:34px;width:max-content;animation:scroll 38s linear infinite}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .srv{display:flex;align-items:center;gap:10px;flex:0 0 auto;opacity:.8;transition:opacity .2s}
  .srv:hover{opacity:1}
  .srv .ava{width:32px;height:32px;border-radius:50%;flex:0 0 32px;object-fit:cover;
    background:var(--surface-3);display:grid;place-items:center;font-family:var(--font-mono);
    font-weight:600;color:var(--peri);font-size:13px;border:1px solid var(--line)}
  .srv .nm{font-family:var(--font-mono);font-weight:600;font-size:13px;color:#fff;white-space:nowrap;line-height:1.1}
  .srv .mc{font-size:11px;color:var(--txt-faint);margin-top:1px;white-space:nowrap}
  .marquee.loading{height:34px}

  /* ── features section ── */
  .features{padding:30px 0 90px}
  .feat-eyebrow{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;
    color:var(--txt-faint);display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .feat-eyebrow::before{content:'';width:22px;height:1px;background:var(--peri-deep)}
  .feat-h{font-family:var(--font-mono);font-size:clamp(28px,3.6vw,40px);font-weight:700;
    letter-spacing:-.01em;margin-bottom:34px}
  .feat-h .slash{color:var(--peri);font-weight:400;margin:0 6px}
  .feat-h .b{color:#f6f5fb}.feat-h .m{color:#6f6f7d;font-weight:500}
  .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .feat-card{position:relative;border:1px solid var(--line);border-radius:16px;background:var(--surface);
    padding:24px;overflow:hidden;opacity:0;transform:translateY(16px);transition:.5s cubic-bezier(.2,.7,.2,1)}
  .feat-card.in{opacity:1;transform:none}
  .feat-card:hover{border-color:var(--line-2);background:var(--surface-2)}
  .feat-card .num{position:absolute;top:24px;right:24px;font-family:var(--font-mono);font-size:12px;color:var(--txt-faint)}
  .feat-card .fi{width:42px;height:42px;border-radius:11px;background:var(--surface-3);border:1px solid var(--line);
    display:grid;place-items:center;color:var(--peri);margin-bottom:18px;transition:.2s}
  .feat-card:hover .fi{background:var(--peri);color:#000;border-color:var(--peri);transform:translateY(-2px)}
  .feat-card h3{font-family:var(--font-mono);font-size:17px;font-weight:600;margin-bottom:9px}
  .feat-card p{color:var(--txt-dim);font-size:14px;line-height:1.6;margin-bottom:16px}
  .feat-card .more{font-family:var(--font-mono);font-size:12.5px;color:var(--txt-faint);
    display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .feat-card:hover .more{color:var(--peri);gap:9px}

  /* closing CTA */
  .closing{text-align:center;padding:30px 0 100px}
  .closing .ce{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--peri);margin-bottom:14px}
  .closing h2{font-family:var(--font-mono);font-size:clamp(26px,3.4vw,38px);font-weight:700;
    letter-spacing:-.01em;margin-bottom:26px;line-height:1.15}
  .closing h2 .m{color:#6f6f7d;font-weight:500}

  @media(max-width:920px){
    .hero{grid-template-columns:1fr;gap:30px;padding:40px 0 20px;min-height:0}
    .palette{max-width:440px}
    .feat-grid{grid-template-columns:1fr}
  }
</style></head><body>
<div class="ambient"></div>
<script src="/shared.js"></script>
<main class="wrap">
  <section class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow" id="eyebrow"></div>
      <h1><span class="l1" id="h1a"></span><span class="l2" id="h1b"></span><span class="l2"><span id="h1c"></span><span class="dot">.</span></span></h1>
      <p class="sub" id="subline"></p>
      <div class="hero-cta">
        <a class="btn btn-primary" href="https://discord.gg/depend">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4a18 18 0 0 0-4.5-1.4l-.2.5a16 16 0 0 1 3.4 1.1A15 15 0 0 0 5.3 4.2a16 16 0 0 1 3.4-1.1l-.2-.5A18 18 0 0 0 4 4C1.7 7.5 1 11 1.2 14.4A18 18 0 0 0 6.6 17l.6-.9c-.6-.2-1.1-.5-1.6-.8l.4-.3a12 12 0 0 0 10 0l.4.3c-.5.3-1 .6-1.6.8l.6.9a18 18 0 0 0 5.4-2.6C23 10.8 22 7 20 4ZM8.4 13.2c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Zm7.2 0c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Z"/></svg>
          Add to Discord</a>
        <a class="btn btn-dark" href="/commands">Explore →</a>
      </div>
      <p class="powering" style="font-family:var(--font-mono);color:var(--txt-faint);font-size:12.5px;margin-top:26px">
        powering <b id="p-users" style="color:#fff">4,243</b> users · <b id="p-guilds" style="color:#fff">90</b> servers</p>
    </div>

    <div class="palette" id="palette">
      <div class="pal-item sel" data-href="/commands">
        <span class="pi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m4 7 5 5-5 5M12 17h8"/></svg></span>
        <span class="pt">Commands</span><span class="pa">→</span></div>
      <div class="pal-item" data-href="/embeds">
        <span class="pi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg></span>
        <span class="pt">Embed Studio</span><span class="pa">→</span></div>
      <div class="pal-item" data-href="/dashboard">
        <span class="pi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>
        <span class="pt">Dashboard</span><span class="pa">→</span></div>
      <div class="pal-item" data-href="/status">
        <span class="pi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg></span>
        <span class="pt">Status</span><span class="pa">→</span></div>
      <div class="pal-item" data-href="/docs">
        <span class="pi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h7v16H6a2 2 0 0 1-2-2zM20 4h-7v16h5a2 2 0 0 0 2-2z"/></svg></span>
        <span class="pt">Docs</span><span class="pa">→</span></div>
      <div class="pal-item" data-href="https://discord.gg/depend">
        <span class="pi"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4a18 18 0 0 0-4.5-1.4l-.2.5a16 16 0 0 1 3.4 1.1A15 15 0 0 0 5.3 4.2a16 16 0 0 1 3.4-1.1l-.2-.5A18 18 0 0 0 4 4C1.7 7.5 1 11 1.2 14.4A18 18 0 0 0 6.6 17l.6-.9c-.6-.2-1.1-.5-1.6-.8l.4-.3a12 12 0 0 0 10 0l.4.3c-.5.3-1 .6-1.6.8l.6.9a18 18 0 0 0 5.4-2.6C23 10.8 22 7 20 4Z"/></svg></span>
        <span class="pt">Support</span><span class="pa">→</span></div>
      <div class="pal-hint">↑↓ to navigate · enter to open</div>
    </div>
  </section>

  <div class="marquee loading" id="marquee"></div>

  <section class="features">
    <div class="feat-eyebrow">Features</div>
    <div class="feat-h"><span class="b">Immerse</span><span class="slash">/</span><span class="m">into depend</span></div>
    <div class="feat-grid" id="featgrid"></div>
  </section>

  <section class="closing">
    <div class="ce">get started</div>
    <h2>check out the commands<br><span class="m">and add depend to your server</span></h2>
    <div class="hero-cta" style="justify-content:center">
      <a class="btn btn-primary" href="https://discord.gg/depend" style="font-family:var(--font-mono)">Add to Discord</a>
      <a class="btn btn-dark" href="/commands" style="font-family:var(--font-mono)">View Commands →</a>
    </div>
  </section>
</main>

<script>
mountChrome('home');

// ── typewriter headline + eyebrow + subline ──
(async()=>{
  await typewriter(document.getElementById('eyebrow'),'multipurpose discord bot',{speed:26});
  typeSequence([
    {el:document.getElementById('h1a'),text:'Everything'},
    {el:document.getElementById('h1b'),text:'your server'},
    {el:document.getElementById('h1c'),text:'needs'}
  ],{speed:46});
  setTimeout(()=>typewriter(document.getElementById('subline'),
    'Moderation, antinuke, voice channels, embed builder, and more — depend handles it all so your server runs smoothly.',
    {speed:14}),300);
})();

// ── command palette: keyboard navigation, no text caret ──
(function(){
  const items=[...document.querySelectorAll('.pal-item')];
  let sel=0;
  function setSel(i){sel=(i+items.length)%items.length;
    items.forEach((it,n)=>it.classList.toggle('sel',n===sel));
    items[sel].scrollIntoView({block:'nearest'});}
  items.forEach((it,n)=>{
    it.addEventListener('mouseenter',()=>setSel(n));
    it.addEventListener('click',()=>{const h=it.dataset.href;
      if(h.startsWith('http'))location.href=h;else location.href=h;});
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowDown'){e.preventDefault();setSel(sel+1);}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(sel-1);}
    else if(e.key==='Enter'&&document.querySelector('.palette')){
      const h=items[sel].dataset.href; if(h)location.href=h;}
  });
})();

// ── features grid ──
const FEATURES=[
  ['Moderation','Bans, mutes, jails, purges and channel locks — keep your server secure with fast, reversible tools.','shield'],
  ['Antinuke','Advanced security that detects and reverses raids, mass bans, and unauthorized changes automatically.','lock'],
  ['VoiceMaster','Dynamic join-to-create voice channels with full control over permissions, visibility and access.','mic'],
  ['Customize','Make depend yours — custom welcome, boost and farewell messages with a visual embed builder.','brush'],
  ['Leveling','Reward active members with XP, ranks, and custom level-up cards that grow with your community.','trophy'],
  ['Tickets','A clean, threaded support system with categories, transcripts, and staff-only handoff.','ticket']
];
const FI={
  shield:'<path d="M12 3l8 3v6c0 4.5-3 7.5-8 9-5-1.5-8-4.5-8-9V6z"/>',
  lock:'<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
  mic:'<rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>',
  brush:'<path d="M3 21c3 0 5-2 5-5l9-9-4-4-9 9c-3 0-5 2-5 5z"/>',
  trophy:'<path d="M6 4h12v4a6 6 0 0 1-12 0zM4 6H2a2 2 0 0 0 4 0M20 6h2a2 2 0 0 1-4 0M9 18h6M12 14v4M8 21h8"/>',
  ticket:'<path d="M3 9a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4z"/>'
};
document.getElementById('featgrid').innerHTML=FEATURES.map(([t,d,ic],i)=>`
  <div class="feat-card" data-i="${i}">
    <span class="num">${String(i+1).padStart(2,'0')}</span>
    <div class="fi"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">${FI[ic]}</svg></div>
    <h3>${t}</h3><p>${d}</p>
    <a class="more" href="/commands">Learn more →</a>
  </div>`).join('');
// reveal on scroll
const io=new IntersectionObserver((es)=>es.forEach(e=>{
  if(e.isIntersecting){setTimeout(()=>e.target.classList.add('in'),(+e.target.dataset.i%3)*90);io.unobserve(e.target);}
}),{threshold:.2});
document.querySelectorAll('.feat-card').forEach(c=>io.observe(c));

// ── stats + marquee (kept) ──
(async()=>{
  try{ const s=await (await fetch('/api/status')).json();const sh=s.shards&&s.shards[0];
    if(sh){document.getElementById('p-users').textContent=fmt(sh.users);
      document.getElementById('p-guilds').textContent=fmt(sh.servers);}}catch{}
})();
(async()=>{
  const m=document.getElementById('marquee');
  try{
    const d=await (await fetch('/api/servers')).json();
    const list=d.servers||[];
    if(d.totalUsers)document.getElementById('p-users').textContent=fmt(d.totalUsers);
    if(d.totalGuilds)document.getElementById('p-guilds').textContent=fmt(d.totalGuilds);
    if(!list.length){m.remove();return;}
    const card=s=>`<div class="srv">
      ${s.icon?`<img class="ava" src="${s.icon}" alt="" loading="lazy">`
              :`<div class="ava">${(s.name||'?').trim().charAt(0).toUpperCase()}</div>`}
      <div><div class="nm">${s.name}</div><div class="mc">${fmt(s.members)} members</div></div></div>`;
    const row=list.map(card).join('');
    m.classList.remove('loading');
    m.innerHTML=`<div class="marquee-track">${row}${row}</div>`;
    const dur=Math.max(22,Math.round(list.length*2.4));
    m.querySelector('.marquee-track').style.animationDuration=dur+'s';
  }catch(e){ m.remove(); }
})();
</script>
</body></html>
