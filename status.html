<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Status — depend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .banner{display:flex;align-items:center;gap:16px;padding:22px 26px;border-radius:var(--r-lg);
    border:1px solid var(--line);background:var(--surface);margin-bottom:28px}
  .banner .big-dot{width:14px;height:14px;border-radius:50%;background:var(--green);
    box-shadow:0 0 14px var(--green);flex:0 0 14px;animation:pulse2 2.4s infinite}
  @keyframes pulse2{0%,100%{opacity:1}50%{opacity:.45}}
  .banner .big-dot.down{background:var(--red);box-shadow:0 0 14px var(--red)}
  .banner h2{font-family:var(--font-display);font-size:24px;font-weight:600}
  .banner .since{margin-left:auto;font-family:var(--font-mono);font-size:12.5px;color:var(--txt-faint);text-align:right}
  .shards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .shard{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);padding:24px}
  .shard-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .shard-h h3{font-family:var(--font-display);font-size:22px;font-weight:600}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;
    padding:6px 13px;border-radius:999px;border:1px solid rgba(92,226,160,.3);
    background:rgba(92,226,160,.08);color:var(--green)}
  .pill .pd{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .pill.down{border-color:rgba(226,92,122,.3);background:rgba(226,92,122,.08);color:var(--red)}
  .pill.down .pd{background:var(--red)}
  .refreshed{font-family:var(--font-mono);font-size:12px;color:var(--txt-faint);margin-bottom:20px;
    display:flex;align-items:center;gap:7px}
  .smetrics{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px}
  .sm .l{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-faint);
    display:flex;align-items:center;gap:6px}
  .sm .v{font-family:var(--font-display);font-size:26px;font-weight:600;margin-top:7px}
  .lat-bar{height:5px;border-radius:3px;background:var(--line);margin-top:9px;overflow:hidden}
  .lat-bar span{display:block;height:100%;border-radius:3px;background:var(--green)}
  .lat-bar span.mid{background:var(--amber)}.lat-bar span.hi{background:var(--red)}
  .skel{height:200px;border-radius:var(--r-lg)}
</style></head><body>
<script src="/shared.js"></script>
<main class="wrap">
  <div class="page-head"><span class="eyebrow">Live</span><h1>Status</h1>
    <p>Real-time health of every shard, measured against the Discord gateway. Auto-refreshes every 20 seconds.</p></div>

  <div id="banner"></div>
  <div class="refreshed" id="refreshed"><span class="dot live" style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span> connecting…</div>
  <div class="shards" id="shards"><div class="skel"></div></div>
</main>

<script>
mountChrome('status');
function latClass(ms){return ms<100?'':ms<250?'mid':'hi';}
function latWidth(ms){return Math.min(100,Math.max(6,ms/3));}
function ago(ms){const s=Math.round((Date.now()-ms)/1000);return s<2?'just now':s+'s ago';}

async function load(){
  try{
    const s=await (await fetch('/api/status')).json();
    const up=s.operational;
    document.getElementById('banner').innerHTML=`
      <div class="banner"><span class="big-dot ${up?'':'down'}"></span>
        <div><h2>${up?'All systems operational':'Service disruption'}</h2>
          <div style="color:var(--txt-dim);font-size:14px;margin-top:2px">${(s.shards||[]).length} shard${(s.shards||[]).length===1?'':'s'} reporting</div></div>
        <div class="since">checked ${ago(s.checkedAt||Date.now())}</div></div>`;
    document.getElementById('refreshed').innerHTML=
      `<span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span> live · updated ${new Date().toLocaleTimeString()}`
      + (s.source==='rest' ? ' · <span style="color:var(--amber)">bot offline — showing REST latency (start the bot for true gateway ping)</span>' : '');
    const sh=s.shards||[];
    document.getElementById('shards').innerHTML=sh.length?sh.map(x=>`
      <div class="shard">
        <div class="shard-h"><h3>Shard ${x.id + 1}</h3>
          <span class="pill ${x.status==='operational'?'':'down'}"><span class="pd"></span>${x.status==='operational'?'Operational':'Down'}</span></div>
        <div class="smetrics">
          <div class="sm"><div class="l">◉ Latency</div><div class="v">${fmt(x.latency)}<span style="font-size:15px;color:var(--txt-dim)">ms</span></div>
            <div class="lat-bar"><span class="${latClass(x.latency)}" style="width:${latWidth(x.latency)}%"></span></div></div>
          <div class="sm"><div class="l">▦ Servers</div><div class="v">${fmt(x.servers)}</div></div>
          <div class="sm"><div class="l">⚇ Users</div><div class="v">${fmt(x.users)}</div></div>
          <div class="sm"><div class="l">↻ Uptime</div><div class="v" style="font-size:20px">${uptime(s.uptime)}</div></div>
        </div>
      </div>`).join(''):'<div style="color:var(--txt-faint);padding:40px 0">No shards reporting. Check the bot token in <code>.env</code>.</div>';
  }catch(e){
    document.getElementById('banner').innerHTML=`<div class="banner"><span class="big-dot down"></span><div><h2>Status unavailable</h2><div style="color:var(--txt-dim);font-size:14px">Couldn’t reach the Discord API.</div></div></div>`;
    document.getElementById('shards').innerHTML='';
    document.getElementById('refreshed').textContent='retrying…';
  }
}
function uptime(ms){if(!ms)return '—';const s=Math.floor(ms/1000);const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);
  return d?`${d}d ${h}h`:h?`${h}h ${m}m`:`${m}m`;}
load();setInterval(load,20000);
</script>
</body></html>
