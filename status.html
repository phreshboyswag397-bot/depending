<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Status · depend</title>
<link rel="icon" type="image/png" href="/favicon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .status-wrap{text-align:center;padding-top:72px}
  .status-wrap h1{font-family:var(--font-display);font-size:clamp(44px,7vw,80px);font-weight:700;
    letter-spacing:-.03em;margin-bottom:44px}
  .shards{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,520px));gap:18px;
    justify-content:center;text-align:left}
  .shard{border:1px solid var(--line);border-radius:var(--r-lg);background:var(--surface);padding:26px 28px}
  .shard-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
  .shard-h h3{font-family:var(--font-display);font-size:24px;font-weight:600}
  .shard-h .since{display:flex;align-items:center;gap:6px;color:var(--txt-faint);font-size:13px;margin-top:6px}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;
    padding:6px 14px;border-radius:999px;border:1px solid rgba(67,224,138,.3);
    background:rgba(67,224,138,.08);color:var(--green)}
  .pill .pd{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .pill.down{border-color:rgba(226,92,122,.3);background:rgba(226,92,122,.08);color:var(--red)}
  .pill.down .pd{background:var(--red)}
  .smetrics{display:grid;grid-template-columns:1fr 1fr;gap:24px 20px}
  .sm .l{font-size:13px;color:var(--txt-faint)}
  .sm .v{font-family:var(--font-display);font-size:26px;font-weight:600;margin-top:6px;
    display:flex;align-items:center;gap:8px}
  .sm .v svg{color:var(--txt-dim)}
  .sm .v .u{font-size:15px;color:var(--txt-dim);font-weight:500}
  .note{color:var(--txt-faint);font-size:13px;margin-bottom:22px}
  .note .amber{color:var(--amber)}
  .skel{height:210px;border-radius:var(--r-lg);max-width:520px;margin:0 auto}
</style></head><body>
<div class="ambient"></div>
<script src="/shared.js"></script>
<main class="wrap status-wrap">
  <h1>Status</h1>
  <div class="note" id="note"></div>
  <div class="shards" id="shards"><div class="skel"></div></div>
</main>

<script>
mountChrome('status');
function ago(ms){const s=Math.max(0,Math.round((Date.now()-ms)/1000));return s<2?'0s ago':s+'s ago';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
const REFRESH=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>`;
const WIFI=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.5a10 10 0 0 1 14 0M8.5 16a5 5 0 0 1 7 0"/><circle cx="12" cy="19.5" r="1" fill="currentColor"/></svg>`;
const SRV=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="7" rx="2"/><rect x="3" y="13" width="18" height="7" rx="2"/></svg>`;
const USR=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0M16 5.5a3 3 0 0 1 0 5.8M20.5 19a5 5 0 0 0-3-4.6"/></svg>`;

async function load(){
  try{
    const s=await (await fetch('/api/status')).json();
    document.getElementById('note').innerHTML = s.source==='rest'
      ? 'Showing REST latency — <span class="amber">bridge unreachable'
        + (s.bridgeError ? ': ' + esc(s.bridgeError.message
            + (s.bridgeError.detail ? ' (' + s.bridgeError.detail + ')' : '')
            + (s.bridgeError.status ? ' [HTTP ' + s.bridgeError.status + ']' : '')) : '')
        + '</span>' : '';
    const sh=s.shards||[];
    document.getElementById('shards').innerHTML=sh.length?sh.map(x=>`
      <div class="shard">
        <div class="shard-h">
          <div><h3>Shard ${x.id}</h3><div class="since">${REFRESH} ${ago(s.checkedAt||Date.now())}</div></div>
          <span class="pill ${x.status==='operational'?'':'down'}"><span class="pd"></span>${x.status==='operational'?'Operational':'Down'}</span>
        </div>
        <div class="smetrics">
          <div class="sm"><div class="l">Latency</div><div class="v">${WIFI} ${fmt(x.latency)}<span class="u">ms</span></div></div>
          <div class="sm"><div class="l">Servers</div><div class="v">${SRV} ${fmt(x.servers)}</div></div>
          <div class="sm"><div class="l">Users</div><div class="v">${USR} ${fmt(x.users)}</div></div>
          ${s.uptime?`<div class="sm"><div class="l">Uptime</div><div class="v">${uptime(s.uptime)}</div></div>`:''}
        </div>
      </div>`).join(''):'<div style="color:var(--txt-faint)">No shards reporting. Check the bot token in <code>.env</code>.</div>';
  }catch(e){
    document.getElementById('shards').innerHTML='<div style="color:var(--txt-faint)">Status unavailable — couldn’t reach the API.</div>';
  }
}
function uptime(ms){const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);
  return d?`${d}d ${h}h`:h?`${h}h ${m}m`:`${m}m`;}
load();setInterval(load,20000);
</script>
</body></html>
