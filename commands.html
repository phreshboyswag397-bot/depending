<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Commands — depend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .toolbar{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 30px}
  .search{flex:1;min-width:240px;display:flex;align-items:center;gap:11px;
    background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:0 16px}
  .search svg{color:var(--txt-faint);flex:0 0 18px}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--txt);
    font-size:15px;font-family:var(--font-body);padding:14px 0}
  .search input::placeholder{color:var(--txt-faint)}
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:34px}
  .chip{font-family:var(--font-mono);font-size:12.5px;padding:8px 14px;border-radius:9px;
    border:1px solid var(--line);background:var(--surface);color:var(--txt-dim);cursor:pointer;
    transition:.14s;display:flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--peri-deep);color:var(--txt)}
  .chip.active{background:var(--peri);color:var(--ink);border-color:var(--peri);font-weight:500}
  .chip .n{opacity:.6;font-size:11px}
  .chip.active .n{opacity:.75}

  .group{margin-bottom:44px;scroll-margin-top:90px}
  .group-h{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;
    padding-bottom:13px;border-bottom:1px solid var(--line-soft)}
  .group-h h2{font-family:var(--font-display);font-size:23px;font-weight:600;letter-spacing:-.02em}
  .group-h .ct{font-family:var(--font-mono);font-size:12px;color:var(--txt-faint)}
  .cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .cmd{padding:16px 18px;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);
    transition:.14s}
  .cmd:hover{border-color:var(--peri-deep)}
  .cmd.note{background:var(--ink-2);border-style:dashed;border-color:var(--line-soft)}
  .cmd-name{font-family:var(--font-mono);font-size:14.5px;color:var(--peri-bright);font-weight:500;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .cmd-name .args{color:var(--txt-faint);font-weight:400}
  .cmd-name .opt{color:var(--green);opacity:.8}
  .cmd-desc{color:var(--txt-dim);font-size:13.5px;margin-top:7px;line-height:1.5}
  .cmd-alias{display:inline-block;font-family:var(--font-mono);font-size:11px;color:var(--peri);
    background:rgba(183,169,242,.1);border:1px solid rgba(183,169,242,.22);
    padding:2px 8px;border-radius:7px;margin-top:9px}
  .subhead{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--txt-faint);grid-column:1/-1;margin:8px 0 -2px;padding-top:6px}
  .none{color:var(--txt-faint);padding:50px 0;text-align:center;font-size:15px}
</style></head><body>
<script src="/shared.js"></script>
<main class="wrap">
  <div class="page-head">
    <span class="eyebrow">Reference</span>
    <h1>Commands</h1>
    <p>Every command depend ships, pulled straight from the bot. Search by name, or jump to a category.</p>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" placeholder="Search commands… (e.g. ban, vc, embed)" autocomplete="off">
    </div>
  </div>
  <div class="cats" id="cats"></div>
  <div id="out"><div class="none">Loading commands…</div></div>
</main>

<script>
mountChrome('commands');
let DATA=[], active='all';

// parse one raw help line into structured pieces
function parse(line){
  if(line==='') return {kind:'spacer'};
  // section markers like "— Embed Builder —"
  const sec=line.match(/^—\s*(.+?)\s*—$/);
  if(sec) return {kind:'subhead',text:sec[1]};
  // discord-style "-#" small notes  or plain sentences (no command shape)
  const isNote=line.startsWith('-#')||(/^[A-Z]/.test(line)&&!/^[A-Za-z0-9_]+(\s|$)/.test(line.split(' ')[0]))||
               (line.split(' ').length>3 && !/^[a-z]/.test(line) && line.includes(' '));
  // detect alias
  let alias=null;const am=line.match(/\((alias(?:es)?:\s*[^)]+)\)/i);
  if(am)alias=am[1];
  // split "cmd args — description"
  let work=line.replace(/\s*\((alias(?:es)?:[^)]+)\)/i,'').trim();
  let desc='';const dm=work.split(/\s+[—–]\s+/);
  if(dm.length>1){work=dm[0].trim();desc=dm.slice(1).join(' — ').trim();}
  const parts=work.split(/\s+/);
  // a "command" starts with a lowercase token of word-chars (+ optional /)
  const looksCmd=/^[a-z][a-z0-9_]*(\/[a-z0-9_]+)?$/i.test(parts[0]) && !line.startsWith('-#') && !/^[A-Z]/.test(line.charAt(0));
  if(!looksCmd && !alias) return {kind:'note',text:line.replace(/^-#\s*/,'')};
  const name=parts[0]; const args=parts.slice(1).join(' ');
  return {kind:'cmd',name,args,desc,alias};
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function argHTML(a){
  return esc(a).replace(/(\[[^\]]+\])/g,'<span class="opt">$1</span>')
               .replace(/(&lt;[^>]+&gt;)/g,'<span class="args">$1</span>')
               .replace(/(@\w+|#\w+)/g,'<span class="args">$1</span>');
}

function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const out=document.getElementById('out');
  let html='', shown=0;
  for(const cat of DATA){
    if(active!=='all' && cat.title!==active) continue;
    const rows=cat.cmds.map(parse);
    // filter by query against the raw text
    const matched=cat.cmds.filter(c=>!q||c.toLowerCase().includes(q));
    if(q && !matched.length) continue;
    let body='', cnt=0;
    rows.forEach((r,i)=>{
      const raw=cat.cmds[i];
      if(q && !raw.toLowerCase().includes(q) && r.kind!=='subhead') return;
      if(r.kind==='spacer') return;
      if(r.kind==='subhead'){body+=`<div class="subhead">${esc(r.text)}</div>`;return;}
      if(r.kind==='note'){body+=`<div class="cmd note"><div class="cmd-desc" style="margin:0">${esc(r.text)}</div></div>`;cnt++;return;}
      cnt++;
      body+=`<div class="cmd"><div class="cmd-name">,${esc(r.name)}${r.args?` <span class="args">${argHTML(r.args)}</span>`:''}</div>
        ${r.desc?`<div class="cmd-desc">${esc(r.desc)}</div>`:''}
        ${r.alias?`<span class="cmd-alias">${esc(r.alias)}</span>`:''}</div>`;
    });
    if(!cnt) continue;
    shown++;
    html+=`<section class="group" id="cat-${slug(cat.title)}">
      <div class="group-h"><h2>${esc(cat.title.replace(/ Commands$/,''))}</h2>
        <span class="ct">${cnt} ${cnt===1?'command':'commands'}</span></div>
      <div class="cmd-grid">${body}</div></section>`;
  }
  out.innerHTML=shown?html:'<div class="none">No commands match “'+esc(q)+'”.</div>';
}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');}

(async()=>{
  try{
    DATA=await (await fetch('/api/commands')).json();
    const total=DATA.reduce((n,c)=>n+c.cmds.filter(l=>/^[a-z]/.test(l)&&!l.startsWith('-#')).length,0);
    const chips=[`<div class="chip active" data-c="all">All <span class="n">${total}+</span></div>`]
      .concat(DATA.map(c=>{
        const n=c.cmds.filter(l=>/^[a-z]/.test(l)&&!l.startsWith('-#')&&!l.startsWith('—')).length;
        return `<div class="chip" data-c="${esc(c.title)}">${esc(c.title.replace(/ Commands$/,''))} <span class="n">${n}</span></div>`;
      }));
    document.getElementById('cats').innerHTML=chips.join('');
    document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      ch.classList.add('active');active=ch.dataset.c;render();window.scrollTo({top:0,behavior:'smooth'});
    });
    render();
  }catch(e){document.getElementById('out').innerHTML='<div class="none">Couldn’t load commands.</div>';}
})();
document.getElementById('q').addEventListener('input',render);
</script>
</body></html>
