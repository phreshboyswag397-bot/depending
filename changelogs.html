<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Changelogs — depend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .timeline{position:relative;padding-left:30px;max-width:760px}
  .timeline::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:1px;background:var(--line)}
  .entry{position:relative;margin-bottom:38px}
  .entry::before{content:"";position:absolute;left:-27px;top:6px;width:13px;height:13px;border-radius:50%;
    background:var(--ink);border:2px solid var(--peri-deep)}
  .entry.new::before{background:var(--peri);border-color:var(--peri);box-shadow:0 0 12px var(--peri)}
  .entry-h{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap}
  .entry-h h2{font-family:var(--font-display);font-size:21px;font-weight:600}
  .entry-h .date{font-family:var(--font-mono);font-size:12.5px;color:var(--txt-faint)}
  .tag{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 9px;border-radius:6px;font-weight:500}
  .tag.new{background:rgba(183,169,242,.13);color:var(--peri);border:1px solid rgba(183,169,242,.28)}
  .tag.improved{background:rgba(92,226,160,.1);color:var(--green);border:1px solid rgba(92,226,160,.25)}
  .entry ul{list-style:none;margin-top:12px;display:grid;gap:9px}
  .entry li{position:relative;padding-left:22px;color:var(--txt-dim);font-size:15px;line-height:1.5}
  .entry li::before{content:"›";position:absolute;left:6px;top:-1px;color:var(--peri);font-weight:700}
</style></head><body>
<script src="/shared.js"></script>
<main class="wrap">
  <div class="page-head"><span class="eyebrow">What's new</span><h1>Changelogs</h1>
    <p>Every meaningful change to depend, newest first.</p></div>
  <div class="timeline" id="tl"><div style="color:var(--txt-faint)">Loading…</div></div>
</main>
<script>
mountChrome('changelogs');
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}
(async()=>{
  try{
    const logs=await (await fetch('/api/changelogs')).json();
    document.getElementById('tl').innerHTML=logs.map(l=>`
      <div class="entry ${l.tag==='new'?'new':''}">
        <div class="entry-h"><h2>${esc(l.version)}</h2>
          <span class="tag ${esc(l.tag)}">${esc(l.tag)}</span>
          <span class="date">${new Date(l.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span></div>
        <ul>${l.items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
      </div>`).join('');
  }catch(e){document.getElementById('tl').innerHTML='<div style="color:var(--txt-faint)">Couldn’t load changelogs.</div>';}
})();
</script>
</body></html>
