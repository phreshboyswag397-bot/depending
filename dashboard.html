<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard · depend</title>
<link rel="icon" type="image/png" href="/favicon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght;500;600;700&family=Nunito:wght;500;600;700;800;900&family=JetBrains+Mono:wght;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  .dash-head{padding-top:64px}
  .dash-head .eyebrow{display:block;margin-bottom:14px}
  .dash-head h1{font-family:var(--font-display);font-size:clamp(38px,6vw,64px);font-weight:700;
    letter-spacing:-.03em;line-height:1.02;margin-bottom:12px}
  .dash-head p{color:var(--txt-dim);font-size:16.5px;max-width:560px}

  .signin{max-width:440px;margin:54px auto 0;border:1px solid var(--line);border-radius:var(--r-lg);
    background:var(--surface);padding:34px 32px;text-align:center}
  .signin .ic{width:62px;height:62px;border-radius:16px;background:#fff;color:#000;display:grid;
    place-items:center;margin:0 auto 20px}
  .signin h2{font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:8px}
  .signin .scopes{color:var(--txt-dim);font-size:14.5px;margin-bottom:24px}
  .signin .scopes code{font-family:var(--font-mono);font-size:13px;color:var(--peri);
    background:rgba(183,169,242,.1);padding:2px 7px;border-radius:6px}
  .signin .go{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:10px;
    background:#fff;color:#000;font-weight:600;font-size:15.5px;padding:15px;border-radius:999px;
    border:none;cursor:pointer;transition:.16s}
  .signin .go:hover{background:#e9e9ef;transform:translateY(-1px)}
  .perks{display:grid;gap:11px;margin-top:24px;text-align:left}
  .perk{display:flex;align-items:center;gap:10px;color:var(--txt-dim);font-size:14px}
  .perk svg{color:var(--green);flex:0 0 17px}

  /* logged-in view */
  .guilds{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:30px}
  .guild{display:flex;align-items:center;gap:13px;padding:16px;border:1px solid var(--line);
    border-radius:var(--r);background:var(--surface);transition:.15s}
  .guild:hover{border-color:var(--line-2);background:var(--surface-2)}
  .guild .gava{width:46px;height:46px;border-radius:13px;flex:0 0 46px;object-fit:cover;background:var(--surface-3);
    display:grid;place-items:center;font-family:var(--font-display);font-weight:600;color:var(--peri);border:1px solid var(--line)}
  .guild .gn{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .guild .gr{font-size:12.5px;color:var(--txt-faint);margin-top:2px}
  .guild .badge{margin-left:auto;font-size:11px;font-family:var(--font-mono);padding:4px 9px;border-radius:7px;
    background:rgba(183,169,242,.1);color:var(--peri);border:1px solid rgba(183,169,242,.22);flex:0 0 auto}
  .guild .badge.add{background:rgba(255,255,255,.04);color:var(--txt-dim);border-color:var(--line)}
  .userbar{display:flex;align-items:center;gap:13px;margin-top:30px;padding:16px 18px;border:1px solid var(--line);
    border-radius:var(--r);background:var(--surface)}
  .userbar img{width:42px;height:42px;border-radius:50%}
  .userbar .un{font-weight:600}.userbar .us{color:var(--txt-faint);font-size:13px}
  .userbar .out{margin-left:auto;font-size:13.5px;color:var(--txt-dim);border:1px solid var(--line);
    padding:8px 16px;border-radius:999px;cursor:pointer}
  .userbar .out:hover{color:#fff;border-color:var(--line-2)}
  .muted{color:var(--txt-faint);font-size:14px;margin-top:18px}
  .errbox{max-width:560px;margin:0 auto;border:1px solid rgba(226,92,122,.3);
    background:rgba(226,92,122,.07);border-radius:14px;padding:18px 20px}
  .errbox .et{color:#f3c2cd;font-size:14.5px;line-height:1.55}
  .errbox code{font-family:var(--font-mono);font-size:12.5px;background:rgba(255,255,255,.07);
    padding:2px 6px;border-radius:5px;color:#fff}
  .errbox .fix{margin-top:14px;color:var(--txt-dim);font-size:13.5px}
  .errbox .ru{font-family:var(--font-mono);font-size:13px;color:var(--peri);background:#0a0a0e;
    border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-top:8px;word-break:break-all}
  .errbox .hint{margin-top:9px;font-size:12.5px;color:var(--txt-faint)}
</style></head><body>
<div class="ambient"></div>
<script src="/shared.js"></script>
<main class="wrap" id="main">
  <div style="color:var(--txt-faint);padding:80px 0">Loading…</div>
</main>

<script>
mountChrome('dashboard');
let CLIENT_ID='1510219788964593756';
fetch('/api/config').then(r=>r.json()).then(c=>{if(c.clientId)CLIENT_ID=c.clientId;}).catch(()=>{});
const DISCORD_ICON=`<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09-.01-.02-.04-.03-.07-.03-1.5.26-2.93.71-4.27 1.33-.01 0-.02.01-.03.02-2.72 4.07-3.47 8.03-3.1 11.95 0 .02.01.04.03.05 1.8 1.32 3.53 2.12 5.24 2.65.03.01.06 0 .07-.02.4-.55.76-1.13 1.07-1.74.02-.04 0-.08-.04-.09-.57-.22-1.11-.48-1.64-.78-.04-.02-.04-.08-.01-.11.11-.08.22-.17.33-.25.02-.02.05-.02.07-.01 3.44 1.57 7.15 1.57 10.55 0 .02-.01.05-.01.07.01.11.09.22.17.33.26.04.03.04.09-.01.11-.52.31-1.07.56-1.64.78-.04.01-.05.06-.04.09.32.61.68 1.19 1.07 1.74.03.02.06.03.09.02 1.72-.53 3.45-1.33 5.25-2.65.02-.01.03-.03.03-.05.44-4.53-.73-8.46-3.1-11.95-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12 0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12 0 1.17-.83 2.12-1.89 2.12z"/></svg>`;
const CHECK=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.4 2.4 4.6-4.8"/></svg>`;
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

async function errorBanner(){
  const err=new URLSearchParams(location.search).get('error');
  if(!err) return '';
  let cfg={};try{cfg=await (await fetch('/api/config')).json();}catch{}
  const msgs={
    config:'Login isn’t configured on the server yet — <code>CLIENT_SECRET</code> is missing from the environment.',
    oauth:'Discord rejected the login. This almost always means the redirect URL below isn’t registered, or the client secret is wrong.',
    state:'The login session expired or didn’t match. Try again.'
  };
  const tip = (err==='oauth'||err==='config') && cfg.redirectUri
    ? `<div class="fix">Add this exact URL under <b>OAuth2 → Redirects</b> in the Discord Developer Portal:
        <div class="ru">${esc(cfg.redirectUri)}</div>
        ${cfg.baseUrlSet?'':'<div class="hint">Tip: also set <code>BASE_URL</code> in your <code>.env</code> to your real domain.</div>'}</div>` : '';
  return `<div class="errbox"><div class="et">${msgs[err]||'Something went wrong.'}</div>${tip}</div>`;
}

async function signedOut(){
  const banner=await errorBanner();
  document.getElementById('main').innerHTML=`
    <div class="dash-head"><span class="eyebrow">dashboard</span>
      <h1>Sign in to manage your servers</h1>
      <p>Connect your Discord account to configure depend across every server you manage.</p></div>
    ${banner}
    <div class="signin">
      <div class="ic"><img src="/logo.png?v=2" alt="depend" width="34" height="34" style="filter:invert(1)"></div>
      <h2>Continue with Discord</h2>
      <p class="scopes">We only request the <code>identify</code> and <code>guilds</code> scopes.</p>
      <button class="go" onclick="location.href='/auth/discord'">${DISCORD_ICON} Sign in with Discord</button>
      <div class="perks">
        <div class="perk">${CHECK} See servers you manage</div>
        <div class="perk">${CHECK} Configure depend per server</div>
        <div class="perk">${CHECK} Securely encrypted session cookie</div>
      </div>
    </div>`;
}

function signedIn(me){
  const av=me.user.avatar
    ? `https://cdn.discordapp.com/avatars/${me.user.id}/${me.user.avatar}.png?size=128`
    : `https://cdn.discordapp.com/embed/avatars/0.png`;
  const guilds=(me.guilds||[]).sort((a,b)=>(b.botIn-a.botIn)||a.name.localeCompare(b.name));
  document.getElementById('main').innerHTML=`
    <div class="dash-head"><span class="eyebrow">dashboard</span>
      <h1>Your servers</h1>
      <p>Servers where you have Manage Server permission. Pick one to configure depend.</p></div>
    <div class="userbar">
      <img src="${av}" alt=""><div><div class="un">${esc(me.user.global_name||me.user.username)}</div>
        <div class="us">@${esc(me.user.username)}</div></div>
      <span class="out" onclick="location.href='/auth/logout'">Sign out</span></div>
    ${guilds.length?`<div class="guilds">${guilds.map(g=>{
      const gi=g.icon?`https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=128`:null;
      const href=g.botIn?`/dashboard/${g.id}`
        :`https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&scope=bot+applications.commands&permissions=8&guild_id=${g.id}&disable_guild_select=true`;
      const target=g.botIn?'':' target="_blank" rel="noopener"';
      return `<a class="guild" href="${href}"${target}>
        ${gi?`<img class="gava" src="${gi}" alt="">`:`<div class="gava">${esc((g.name||'?').charAt(0).toUpperCase())}</div>`}
        <div style="min-width:0"><div class="gn">${esc(g.name)}</div>
          <div class="gr">${g.owner?'Owner':'Manager'}</div></div>
        <span class="badge ${g.botIn?'':'add'}">${g.botIn?'Configure':'Add'}</span></a>`;
    }).join('')}</div>`:'<p class="muted">No servers found where you can manage depend.</p>'}`;
}

(async()=>{
  try{
    const r=await fetch('/api/me');
    if(r.status===401){ await signedOut(); return; }
    const me=await r.json();
    if(me&&me.user) signedIn(me); else await signedOut();
  }catch{ await signedOut(); }
})();
</script>
</body></html>
